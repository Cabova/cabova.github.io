<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cabova: The ultimate Financial Freedom & Pension Simulator. Plan your retirement with total privacy and precision.">
    <title>Cabova | Pension & Financial Freedom Simulator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-light: #f8fafc;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Hero Section */
        header {
            padding: 80px 0 60px;
            text-align: center;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--primary);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 24px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .tagline {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-image-container {
            margin-bottom: 60px;
            position: relative;
            display: inline-block;
        }

        .hero-image-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, rgba(248, 250, 252, 0) 70%);
            z-index: -1;
        }

        .hero-image {
            max-width: 280px;
            height: auto;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease;
        }

        .hero-image:hover {
            transform: translateY(-10px);
        }

        /* Call to Action */
        .cta-section {
            margin-bottom: 60px;
        }

        .play-store-btn {
            display: inline-flex;
            align-items: center;
            background-color: #000;
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .play-store-btn:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .play-store-btn i {
            font-size: 24px;
            margin-right: 12px;
        }

        .play-store-btn .btn-text {
            text-align: left;
        }

        .play-store-btn .btn-text span {
            display: block;
            font-size: 10px;
            font-weight: 400;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .social-icon {
            font-size: 24px;
            color: var(--text-muted);
            transition: color 0.2s ease, transform 0.2s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .footer-links {
            margin-bottom: 16px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header, .hero-image-container, .cta-section, .social-links {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        .hero-image-container { animation-delay: 0.2s; }
        .cta-section { animation-delay: 0.4s; }
        .social-links { animation-delay: 0.6s; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Cabova</div>
            <h1>Your Future, Calculated with Precision</h1>
            <p class="tagline">The most private and powerful pension & financial freedom simulator. Local-first, secure, and built for your clarity.</p>
        </header>

        <section style="text-align: center;">
            <div class="hero-image-container">
                <img src="hero.png" alt="Cabova App on iPhone" class="hero-image">
            </div>
        </section>

        <section class="cta-section" style="text-align: center;">
            <a href="https://play.google.com/store/apps/details?id=com.numba.app" class="play-store-btn">
                <i class="fab fa-google-play"></i>
                <div class="btn-text">
                    <span>Get it on</span>
                    Google Play
                </div>
            </a>
        </section>

        <div class="social-links">
            <a href="https://x.com/CabovaSupport" class="social-icon" title="Follow on X">
                <i class="fab fa-x-twitter"></i>
            </a>
            <a href="https://www.instagram.com/cabova.support/" class="social-icon" title="Follow on Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.tiktok.com/@cabova_fire" class="social-icon" title="Follow on TikTok">
                <i class="fab fa-tiktok"></i>
            </a>
        </div>

        <footer>
            <div class="footer-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="support.html">Support</a>
            </div>
            <p>&copy; 2026 Cabova Digital. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
